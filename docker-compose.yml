services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - uploads:/app/public/uploads
      - db:/data
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.alt3d.rule=Host(`alt3dstudio.com`) || Host(`www.alt3dstudio.com`)"
      - "traefik.http.routers.alt3d.entrypoints=websecure"
      - "traefik.http.routers.alt3d.tls.certresolver=letsencrypt"
      - "traefik.http.services.alt3d.loadbalancer.server.port=3000"
      - "traefik.http.routers.alt3d-http.rule=Host(`alt3dstudio.com`) || Host(`www.alt3dstudio.com`)"
      - "traefik.http.routers.alt3d-http.entrypoints=web"
      - "traefik.http.routers.alt3d-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"

volumes:
  uploads:
  db:

networks:
  proxy:
    external: true
